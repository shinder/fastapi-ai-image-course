{% extends "base.html" %}

{% block title %}上傳圖片{% endblock %}

{% block content %}
  <h1 class="mb-4">上傳圖片</h1>

  {# 表單送到 POST /web/upload（handle_upload）；上傳檔案一定要用 multipart/form-data #}
  <form action="{{ url_for('handle_upload') }}" method="post" enctype="multipart/form-data">
    <div class="mb-3">
      {# name="file" 要和後端 UploadFile 參數名一致 #}
      <input type="file" name="file" accept="image/*" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">上傳</button>
  </form>

  <p class="mt-3 text-muted small">上傳成功後會自動導回圖片列表頁。</p>
{% endblock %}
